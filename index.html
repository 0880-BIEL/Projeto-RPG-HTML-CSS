<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Ficha de personagem</title>
    <link rel="stylesheet" href="style.css">
</head>


<body>
    <header class="topo">
        <section class="Conteiner-topo">

            <div class="Conteiner-Nome do jogador">

              <p>Nome do jogador</p>
              <input type="text" name="" id="">

            </div>
            
            <div class="Conteiner-Nome do personagem">
                <p>Nome do personagem</p>
                <input type="text" name="" id="">
            </div>
            <div class="Conteiner-Raça">
                <p>Raça</p>
                <input type="text" name="" id="">
            </div>
            <div class="Conteiner-Classe">
                <p>Classe</p>
                <input type="text" name="" id="">
            </div>
            <div class="Conteiner-Pontos de experiencia">
                <p>Pontos de experiencia</p>
                <input type="text" name="" id="">
            </div>
            <div class="Conteiner-Alinhamento ">
                <p>Alinhamento</p>
                <input type="text" name="" id="">
            </div>

        </section>

    </header>


    <main class="Conteiner-conteudo-principal">
        <section class="sessao-conteudo-principal">
            <div class="Conteiner-modificadores">
                <div class="FORCA">
                    <P>FOR</P>
                    <input type="text" name="" id="">
                </div>
                <div class="DESESTRESA">
                    <p>DES</p>
                    <input type="text" name="" id="">
                </div>
                <div class="CONSTITUICA">
                    <p>CONS</p>
                    <input type="text" name="" id="">
                </div>
                <div class="INTELIGENCIA">
                    <p>INT</p>
                    <input type="text" name="" id="">
                </div>
                <div class="SABEDORIA">
                    <p>SAB</p>
                    <input type="text" name="" id="">
                </div>
                <div class="CARISMA">
                    <p>CAR</p>
                    <input type="text" name="" id="">
                </div>

            </div>
            
            <div class="Conteiner-vdv-img">
                <div class="vdv">

                    <div class="Vida">
                        <p>Vida</p>
                        <input type="text">
                    </div>

                    <div class="DEF">
                        <p>Defesa</p>
                        <input type="text">
                    </div>

                    <div class="VEL">
                        <p>Velocidade</p>
                        <input type="text">
                    </div>                    
                </div>

                <div class="Conteiner-img">
                    <img src="Pasta.img-rpg/Personagem-rpg-removebg-preview.png" alt="">
                </div>

            </div>
                
            
        </section>

    </main>


</body>
</html>
